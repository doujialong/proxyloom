openapi: 3.1.0
info:
  title: ProxyLoom Target Management API
  version: 0.1.0-m0
  summary: Target contract for the complete ProxyLoom self-hosted subscription manager.
  description: |
    This is the complete target contract, not evidence that every operation is running.
    The current implemented surface is described by openapi-runtime.yaml.
    All timestamps use RFC 3339. Resource IDs are lowercase UUIDv7 strings.
    Cookie-authenticated unsafe requests also require X-CSRF-Token.
    List cursors are opaque and expire after 15 minutes.
  license:
    name: AGPL-3.0-or-later
    identifier: AGPL-3.0-or-later
servers:
  - url: /
tags:
  - name: System
  - name: Authentication
  - name: Sources
  - name: Nodes
  - name: Resources
  - name: Outputs
  - name: Jobs
  - name: Compatibility
  - name: Publications
security:
  - cookieAuth: []
  - bearerAuth: []
paths:
  /healthz:
    get:
      tags: [System]
      operationId: getHealth
      summary: Report process liveness without secret details.
      security: []
      responses:
        '200':
          description: Process is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /readyz:
    get:
      tags: [System]
      operationId: getReadiness
      summary: Report whether management and publication traffic can be served.
      security: []
      responses:
        '200':
          description: Service is ready.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
        '503':
          description: Service is safely unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
  /api/v1/setup/status:
    get:
      tags: [System]
      operationId: getSetupStatus
      security: []
      responses:
        '200':
          description: Non-secret initialization status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetupStatus'
  /api/v1/setup/admin:
    post:
      tags: [System]
      operationId: initializeAdministrator
      summary: Create the first administrator exactly once.
      security: []
      parameters:
        - $ref: '#/components/parameters/SetupToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminSetupRequest'
      responses:
        '201':
          description: Administrator initialized and session created.
          headers:
            Set-Cookie:
              schema: {type: string}
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimited'
  /api/v1/session:
    post:
      tags: [Authentication]
      operationId: createSession
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '201':
          description: Authenticated session.
          headers:
            Set-Cookie:
              schema: {type: string}
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
    get:
      tags: [Authentication]
      operationId: getSession
      responses:
        '200':
          description: Current session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      tags: [Authentication]
      operationId: deleteSession
      parameters:
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '204':
          description: Session revoked.
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/session/reauthenticate:
    post:
      tags: [Authentication]
      operationId: reauthenticateSession
      summary: Extend the five-minute recent-authentication window for secret operations.
      parameters:
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [password]
              properties:
                password: {type: string, minLength: 1, maxLength: 1024, writeOnly: true}
      responses:
        '200':
          description: Updated session and recent-authentication deadline.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Session'}
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
  /api/v1/session/password:
    post:
      tags: [Authentication]
      operationId: changeAdministratorPassword
      summary: Change the current administrator password and revoke all sessions.
      parameters:
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [current_password, new_password]
              properties:
                current_password: {type: string, minLength: 1, maxLength: 1024, writeOnly: true}
                new_password: {type: string, minLength: 1, maxLength: 1024, writeOnly: true}
      responses:
        '204':
          description: Password changed and all sessions revoked.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/source-previews:
    post:
      tags: [Sources]
      operationId: previewSource
      description: Detect and parse bounded untrusted input without persisting a Source.
      parameters:
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SourcePreviewRequest'
      responses:
        '200':
          description: Detection and import-purpose preview.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourcePreview'
        '422':
          $ref: '#/components/responses/ValidationError'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
  /api/v1/sources:
    get:
      tags: [Sources]
      operationId: listSources
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - name: status
          in: query
          schema:
            type: string
            enum: [unknown, healthy, degraded, unhealthy, disabled]
        - name: query
          in: query
          schema: {type: string, maxLength: 200}
      responses:
        '200':
          description: Stable page ordered by updated_at desc then id desc.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourcePage'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      tags: [Sources]
      operationId: createSource
      parameters:
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SourceCreate'
      responses:
        '201':
          description: Source with its first draft revision.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Source'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/sources/{sourceId}:
    parameters:
      - $ref: '#/components/parameters/SourceId'
    get:
      tags: [Sources]
      operationId: getSource
      responses:
        '200':
          description: Source details with secrets masked.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Source'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Sources]
      operationId: updateSource
      description: Creates a new immutable draft revision.
      parameters:
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: '#/components/schemas/SourcePatch'
      responses:
        '200':
          description: Updated source and draft revision.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Source'
        '404':
          $ref: '#/components/responses/NotFound'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [Sources]
      operationId: archiveSource
      parameters:
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '204':
          description: Source archived; referenced history is retained.
        '404':
          $ref: '#/components/responses/NotFound'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
  /api/v1/sources/{sourceId}/publish:
    post:
      tags: [Sources]
      operationId: publishSourceRevision
      parameters:
        - $ref: '#/components/parameters/SourceId'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishRevisionRequest'
      responses:
        '200':
          description: Draft revision promoted to published.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Source'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/sources/{sourceId}/revisions:
    get:
      tags: [Sources]
      operationId: listSourceRevisions
      parameters:
        - $ref: '#/components/parameters/SourceId'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Immutable revision history ordered by number descending.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/RevisionPage'}
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/sources/{sourceId}/refreshes:
    post:
      tags: [Sources]
      operationId: refreshSource
      parameters:
        - $ref: '#/components/parameters/SourceId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '202':
          $ref: '#/components/responses/JobAccepted'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/IdempotencyConflict'
  /api/v1/config-exports/{exportId}/content:
    get:
      tags: [System]
      operationId: downloadConfigurationExport
      parameters:
        - name: exportId
          in: path
          required: true
          schema: {$ref: '#/components/schemas/Id'}
      responses:
        '200':
          description: Versioned configuration export; secret exports require recent authentication.
          headers:
            Cache-Control:
              schema: {type: string, const: no-store}
          content:
            application/json:
              schema: {type: object, additionalProperties: true}
        '403':
          $ref: '#/components/responses/RecentAuthenticationRequired'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/sources/{sourceId}/refresh-attempts:
    get:
      tags: [Sources]
      operationId: listRefreshAttempts
      parameters:
        - $ref: '#/components/parameters/SourceId'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Attempts ordered by started_at desc then id desc.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshAttemptPage'
  /api/v1/sources/{sourceId}/snapshots:
    get:
      tags: [Sources]
      operationId: listSnapshots
      parameters:
        - $ref: '#/components/parameters/SourceId'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Accepted snapshots ordered by accepted_at desc then id desc.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SnapshotPage'
  /api/v1/snapshots/{snapshotId}/diff:
    get:
      tags: [Sources]
      operationId: getSnapshotDiff
      parameters:
        - name: snapshotId
          in: path
          required: true
          schema: {$ref: '#/components/schemas/Id'}
        - name: against
          in: query
          required: true
          schema: {$ref: '#/components/schemas/Id'}
      responses:
        '200':
          description: Added, removed, renamed, ambiguous and protocol-change summary.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/SnapshotDiff'}
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/nodes:
    get:
      tags: [Nodes]
      operationId: listNodes
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - name: source_id
          in: query
          schema: {$ref: '#/components/schemas/Id'}
        - name: output_id
          in: query
          schema: {$ref: '#/components/schemas/Id'}
        - name: protocol
          in: query
          schema: {type: string}
        - name: health
          in: query
          schema:
            $ref: '#/components/schemas/NodeHealthState'
        - name: query
          in: query
          schema: {type: string, maxLength: 200}
      responses:
        '200':
          description: Stable node occurrence page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodePage'
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/v1/nodes/{nodeOccurrenceId}:
    get:
      tags: [Nodes]
      operationId: getNode
      parameters:
        - $ref: '#/components/parameters/NodeOccurrenceId'
      responses:
        '200':
          description: Raw/canonical metadata and lineage; secret values remain masked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeDetail'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/nodes/{nodeOccurrenceId}/health-records:
    get:
      tags: [Nodes]
      operationId: listNodeHealthRecords
      parameters:
        - $ref: '#/components/parameters/NodeOccurrenceId'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - name: output_id
          in: query
          required: true
          schema: {$ref: '#/components/schemas/Id'}
      responses:
        '200':
          description: Records ordered by observed_at desc then id desc.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthRecordPage'
  /api/v1/nodes/{nodeOccurrenceId}/secret-view:
    post:
      tags: [Nodes]
      operationId: revealNodeRawValue
      summary: Return the current raw node once after recent authentication and audit the reveal.
      parameters:
        - $ref: '#/components/parameters/NodeOccurrenceId'
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '200':
          description: Unmasked raw node. The response is never cached.
          headers:
            Cache-Control:
              schema: {type: string, const: no-store}
          content:
            application/json:
              schema: {$ref: '#/components/schemas/NodeSecretView'}
        '403':
          $ref: '#/components/responses/RecentAuthenticationRequired'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/nodes/{nodeOccurrenceId}/checks:
    post:
      tags: [Nodes]
      operationId: checkNode
      parameters:
        - $ref: '#/components/parameters/NodeOccurrenceId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [output_id]
              properties:
                output_id: {$ref: '#/components/schemas/Id'}
      responses:
        '202':
          $ref: '#/components/responses/JobAccepted'
        '409':
          $ref: '#/components/responses/IdempotencyConflict'
  /api/v1/node-checks:
    post:
      tags: [Nodes]
      operationId: checkNodeScope
      summary: Queue a source, output or all-node manual check with global Health Key deduplication.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/BulkNodeCheckRequest'}
      responses:
        '202':
          $ref: '#/components/responses/JobAccepted'
        '409':
          $ref: '#/components/responses/IdempotencyConflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/collections:
    get:
      tags: [Resources]
      operationId: listCollections
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Collection page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevisionedResourcePage'
    post:
      tags: [Resources]
      operationId: createCollection
      parameters:
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectionCreate'
      responses:
        '201':
          $ref: '#/components/responses/RevisionedResourceCreated'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/pipelines:
    get:
      tags: [Resources]
      operationId: listPipelines
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Pipeline page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevisionedResourcePage'
    post:
      tags: [Resources]
      operationId: createPipeline
      parameters:
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PipelineCreate'
      responses:
        '201':
          $ref: '#/components/responses/RevisionedResourceCreated'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/pipelines/{pipelineId}:
    parameters:
      - name: pipelineId
        in: path
        required: true
        schema: {$ref: '#/components/schemas/Id'}
    get:
      tags: [Resources]
      operationId: getPipeline
      responses:
        '200':
          description: Pipeline details.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/RevisionedResource'}
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Resources]
      operationId: updatePipeline
      parameters:
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/PipelineCreate'}
      responses:
        '200':
          description: Pipeline updated and affected Outputs queued for rebuild.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/RevisionedResource'}
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/templates:
    get:
      tags: [Resources]
      operationId: listTemplates
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Template page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevisionedResourcePage'
    post:
      tags: [Resources]
      operationId: createTemplate
      parameters:
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TemplateCreate'
      responses:
        '201':
          $ref: '#/components/responses/RevisionedResourceCreated'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/health-policies:
    get:
      tags: [Resources]
      operationId: listHealthPolicies
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Health policy page.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/RevisionedResourcePage'}
    post:
      tags: [Resources]
      operationId: createHealthPolicy
      parameters:
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/PolicyCreate'}
      responses:
        '201':
          $ref: '#/components/responses/RevisionedResourceCreated'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/probe-profiles:
    get:
      tags: [Resources]
      operationId: listProbeProfiles
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Probe profile page.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/RevisionedResourcePage'}
    post:
      tags: [Resources]
      operationId: createProbeProfile
      parameters:
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/PolicyCreate'}
      responses:
        '201':
          $ref: '#/components/responses/RevisionedResourceCreated'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/templates/{templateId}/refreshes:
    post:
      tags: [Resources]
      operationId: refreshTemplate
      parameters:
        - name: templateId
          in: path
          required: true
          schema: {$ref: '#/components/schemas/Id'}
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '202':
          $ref: '#/components/responses/JobAccepted'
        '409':
          $ref: '#/components/responses/IdempotencyConflict'
  /api/v1/resources/{resourceType}/{resourceId}:
    parameters:
      - name: resourceType
        in: path
        required: true
        schema:
          type: string
          enum: [collections, pipelines, templates, health-policies, probe-profiles]
      - name: resourceId
        in: path
        required: true
        schema: {$ref: '#/components/schemas/Id'}
    get:
      tags: [Resources]
      operationId: getRevisionedResource
      responses:
        '200':
          description: Resource details.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevisionedResource'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Resources]
      operationId: updateRevisionedResource
      parameters:
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              type: object
      responses:
        '200':
          description: New draft revision.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevisionedResource'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [Resources]
      operationId: archiveRevisionedResource
      parameters:
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '204':
          description: Resource archived; referenced revisions remain retained.
        '412':
          $ref: '#/components/responses/PreconditionFailed'
  /api/v1/resources/{resourceType}/{resourceId}/publish:
    parameters:
      - name: resourceType
        in: path
        required: true
        schema:
          type: string
          enum: [collections, pipelines, templates, health-policies, probe-profiles]
      - name: resourceId
        in: path
        required: true
        schema: {$ref: '#/components/schemas/Id'}
    post:
      tags: [Resources]
      operationId: publishResourceRevision
      parameters:
        - $ref: '#/components/parameters/IfMatch'
