          description: Last valid immutable artifact.
          headers:
            ETag: {$ref: '#/components/headers/ETag'}
            Last-Modified:
              schema: {type: string}
            Cache-Control:
              schema: {type: string, const: 'private, no-cache'}
            Referrer-Policy:
              schema: {type: string, const: no-referrer}
            X-Content-Type-Options:
              schema: {type: string, const: nosniff}
          content:
            application/json:
              schema: {}
            text/plain:
              schema: {type: string}
        '304':
          description: Artifact is unchanged.
        '401':
          description: Token is invalid or revoked; response does not reveal output existence.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorResponse'}
        '404':
          description: Token is valid but no artifact has ever been published.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorResponse'}
        '503':
          description: Instance is not ready; no empty artifact is returned.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ErrorResponse'}
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: proxyloom_session
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
  headers:
    ETag:
      description: Strong opaque revision or artifact validator.
      schema: {type: string}
  parameters:
    SetupToken:
      name: X-ProxyLoom-Setup-Token
      in: header
      required: true
      description: One-time 256-bit token generated locally by proxyloom bootstrap-token; expires in 30 minutes.
      schema: {type: string, minLength: 43, maxLength: 128}
    Limit:
      name: limit
      in: query
      schema: {type: integer, minimum: 1, maximum: 200, default: 50}
    Cursor:
      name: cursor
      in: query
      description: Opaque cursor bound to the filter and sort; expires after 15 minutes.
      schema: {type: string, maxLength: 2048}
    IfMatch:
      name: If-Match
      in: header
      required: true
      schema: {type: string}
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Opaque 1-128 character key retained for 24 hours. Reuse with a different body returns 409.
      schema: {type: string, minLength: 1, maxLength: 128}
    CsrfToken:
      name: X-CSRF-Token
      in: header
      required: false
      description: Required for unsafe requests authenticated by cookie; ignored for bearer authentication.
      schema: {type: string, minLength: 32, maxLength: 256}
    SourceId:
      name: sourceId
      in: path
      required: true
      schema: {$ref: '#/components/schemas/Id'}
    OutputId:
      name: outputId
      in: path
      required: true
      schema: {$ref: '#/components/schemas/Id'}
    NodeOccurrenceId:
      name: nodeOccurrenceId
      in: path
      required: true
      schema: {$ref: '#/components/schemas/Id'}
    JobId:
      name: jobId
      in: path
      required: true
      schema: {$ref: '#/components/schemas/Id'}
  responses:
    BadRequest:
      description: Request syntax, cursor, filter or sort is invalid.
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorResponse'}
    Unauthorized:
      description: Authentication failed.
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorResponse'}
    RecentAuthenticationRequired:
      description: The operation reveals or exports secrets and requires reauthentication within five minutes.
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorResponse'}
    NotFound:
      description: Resource does not exist or is not visible.
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorResponse'}
    Conflict:
      description: Current resource state conflicts with the operation.
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorResponse'}
    IdempotencyConflict:
      description: Idempotency key was reused with a different request digest.
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorResponse'}
    PreconditionFailed:
      description: If-Match is stale. Error details include current_etag and current_revision_id.
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorResponse'}
    ValidationError:
      description: Semantically invalid request with field-level details.
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorResponse'}
    PayloadTooLarge:
      description: Compressed, decoded, expanded or parsed input exceeded a configured hard limit.
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorResponse'}
    RateLimited:
      description: Rate limit exceeded.
      headers:
        Retry-After:
          schema: {type: integer, minimum: 1}
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorResponse'}
    JobAccepted:
      description: Durable asynchronous job accepted. Client disconnect does not cancel it.
      headers:
        Location:
          schema: {type: string}
      content:
        application/json:
          schema: {$ref: '#/components/schemas/JobReference'}
    RevisionedResourceCreated:
      description: Resource with first immutable draft revision.
      headers:
        ETag:
          $ref: '#/components/headers/ETag'
      content:
        application/json:
          schema: {$ref: '#/components/schemas/RevisionedResource'}
  schemas:
    Id:
      type: string
      format: uuid
      pattern: '^[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$'
    Timestamp:
      type: string
      format: date-time
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [code, message, correlation_id]
          properties:
            code:
              type: string
              pattern: '^[a-z][a-z0-9_]{2,63}$'
              examples: [validation_failed]
            message: {type: string}
            correlation_id: {type: string}
            details:
              type: array
              items:
                type: object
                additionalProperties: false
                required: [code]
                properties:
                  field: {type: string}
                  code: {type: string}
                  message: {type: string}
                  meta: {type: object, additionalProperties: true}
    HealthResponse:
      type: object
      additionalProperties: false
      required: [status, version]
      properties:
        status: {type: string, const: alive}
        version: {type: string}
    ReadinessResponse:
      type: object
      additionalProperties: false
      required: [ready, code]
      properties:
        ready: {type: boolean}
        code:
          type: string
          enum: [ready, setup_required, master_key_missing, master_key_invalid, crypto_integrity_failed, migration_required, migration_failed, storage_unavailable]
    SetupStatus:
      type: object
      additionalProperties: false
      required: [administrator_initialized, master_key, database]
      properties:
        administrator_initialized: {type: boolean}
        master_key: {type: string, enum: [valid, missing, invalid_permissions, invalid_format, invalid]}
        database: {type: string, enum: [ready, migration_required, migration_failed, unavailable]}
    AdminSetupRequest:
      type: object
      additionalProperties: false
      required: [username, password]
      properties:
        username: {type: string, minLength: 3, maxLength: 64}
        password: {type: string, minLength: 1, maxLength: 1024, writeOnly: true}
        timezone: {type: string, default: Asia/Shanghai}
    LoginRequest:
      type: object
      additionalProperties: false
      required: [username, password]
      properties:
        username: {type: string, minLength: 1, maxLength: 64}
        password: {type: string, minLength: 1, maxLength: 1024, writeOnly: true}
    Session:
      type: object
      additionalProperties: false
      required: [administrator, csrf_token, expires_at, recent_auth_until]
      properties:
        administrator:
          type: object
          required: [id, username]
          properties:
            id: {$ref: '#/components/schemas/Id'}
            username: {type: string}
        csrf_token: {type: string, readOnly: true}
        expires_at: {$ref: '#/components/schemas/Timestamp'}
        recent_auth_until: {$ref: '#/components/schemas/Timestamp'}
    PageInfo:
      type: object
      additionalProperties: false
      required: [has_more]
      properties:
        has_more: {type: boolean}
        next_cursor: {type: [string, 'null']}
    SourceKind:
      type: string
      enum: [remote, inline, upload]
    ImportPurpose:
      type: string
      enum: [node_source, template, template_and_nodes, raw_passthrough]
    SourceInput:
      oneOf:
        - type: object
          additionalProperties: false
          required: [kind, url]
          properties:
            kind: {type: string, const: remote}
            url: {type: string, format: uri, writeOnly: true}
            format_hint: {type: [string, 'null']}
            headers:
              type: object
              writeOnly: true
              additionalProperties: {type: string, maxLength: 8192}
            proxy_url: {type: string, format: uri, writeOnly: true, description: HTTP, HTTPS, SOCKS5 or SOCKS5H proxy used only for this source.}
            private_network_authorized: {type: boolean, default: false}
        - type: object
          additionalProperties: false
          required: [kind, content]
          properties:
            kind: {type: string, enum: [inline, upload]}
            content: {type: string, writeOnly: true, maxLength: 52428800}
            format_hint: {type: [string, 'null']}
    SourcePolicy:
      type: object
      additionalProperties: false
      properties:
        refresh_schedule: {type: [string, 'null'], description: Five-field cron or null for manual only.}
        timezone: {type: string, default: UTC}
        timeout_seconds: {type: integer, minimum: 1, maximum: 120, default: 30}
        retry_count: {type: integer, minimum: 0, maximum: 5, default: 2}
        max_response_bytes: {type: integer, minimum: 1024, maximum: 52428800, default: 10485760}
        minimum_nodes: {type: integer, minimum: 0, maximum: 100000, default: 1}
        maximum_drop_ratio: {type: number, minimum: 0, maximum: 1, default: 0.5}
        accept_empty: {type: boolean, default: false}
    SourcePreviewRequest:
      type: object
      additionalProperties: false
      required: [input]
      properties:
        input: {$ref: '#/components/schemas/SourceInput'}
        import_purpose: {$ref: '#/components/schemas/ImportPurpose'}
    SourcePreview:
      type: object
      additionalProperties: false
      required: [detected_format, candidates, node_count, protocol_counts, purposes, warnings]
      properties:
        detected_format: {type: [string, 'null']}
        candidates:
          type: array
          items:
            type: object
            required: [format, confidence, reason]
            properties:
              format: {type: string}
              confidence: {type: number, minimum: 0, maximum: 1}
              reason: {type: string}
        node_count: {type: integer, minimum: 0}
        protocol_counts: {type: object, additionalProperties: {type: integer, minimum: 0}}
        purposes:
          type: array
          items:
            type: object
            required: [purpose, retained_top_level, ignored_top_level, proxy_nodes, logical_outbounds]
            properties:
              purpose: {$ref: '#/components/schemas/ImportPurpose'}
              retained_top_level: {type: array, items: {type: string}}
              ignored_top_level: {type: array, items: {type: string}}
              proxy_nodes: {type: integer, minimum: 0}
              logical_outbounds: {type: integer, minimum: 0}
        warnings: {type: array, items: {$ref: '#/components/schemas/Warning'}}
    SourceCreate:
      type: object
      additionalProperties: false
      required: [display_name, input, import_purpose]
      properties:
        display_name: {type: string, minLength: 1, maxLength: 200}
        input: {$ref: '#/components/schemas/SourceInput'}
        import_purpose: {$ref: '#/components/schemas/ImportPurpose'}
        policy: {$ref: '#/components/schemas/SourcePolicy'}
    SourcePatch:
      type: object
      minProperties: 1
      properties:
        display_name: {type: string, minLength: 1, maxLength: 200}
        input: {$ref: '#/components/schemas/SourceInput'}
        import_purpose: {$ref: '#/components/schemas/ImportPurpose'}
        policy: {$ref: '#/components/schemas/SourcePolicy'}
    RevisionRef:
      type: object
      additionalProperties: false
      required: [id, number, state, created_at]
      properties:
        id: {$ref: '#/components/schemas/Id'}
        number: {type: integer, minimum: 1}
        state: {type: string, enum: [draft, published, superseded, archived]}
        created_at: {$ref: '#/components/schemas/Timestamp'}
    Source:
      type: object
      additionalProperties: false
      required: [id, display_name, lifecycle_state, health, draft_revision, created_at, updated_at]
      properties:
        id: {$ref: '#/components/schemas/Id'}
        display_name: {type: string}
        lifecycle_state: {type: string, enum: [active, archived]}
        health: {type: string, enum: [unknown, healthy, degraded, unhealthy, disabled]}
        stale: {type: boolean}
        draft_revision: {$ref: '#/components/schemas/RevisionRef'}
        published_revision:
          anyOf: [{$ref: '#/components/schemas/RevisionRef'}, {type: 'null'}]
        current_snapshot_id:
          anyOf: [{$ref: '#/components/schemas/Id'}, {type: 'null'}]
        masked_location: {type: [string, 'null']}
        created_at: {$ref: '#/components/schemas/Timestamp'}
        updated_at: {$ref: '#/components/schemas/Timestamp'}
    SourcePage:
      type: object
      required: [items, page]
      properties:
        items: {type: array, items: {$ref: '#/components/schemas/Source'}}
        page: {$ref: '#/components/schemas/PageInfo'}
    PublishRevisionRequest:
      type: object
      additionalProperties: false
      required: [revision_id]
      properties:
        revision_id: {$ref: '#/components/schemas/Id'}
    RefreshAttempt:
      type: object
      required: [id, status, trigger, started_at, warning_count]
      properties:
        id: {$ref: '#/components/schemas/Id'}
        status: {type: string, enum: [running, succeeded, not_modified, rejected, failed]}
        trigger: {type: string, enum: [manual, schedule, retry, import]}
        http_status: {type: [integer, 'null']}
        total_ms: {type: [integer, 'null'], minimum: 0}
        node_count: {type: [integer, 'null'], minimum: 0}
        warning_count: {type: integer, minimum: 0}
        error_code: {type: [string, 'null']}
        accepted_snapshot_id:
          anyOf: [{$ref: '#/components/schemas/Id'}, {type: 'null'}]
        started_at: {$ref: '#/components/schemas/Timestamp'}
        finished_at:
          anyOf: [{$ref: '#/components/schemas/Timestamp'}, {type: 'null'}]
    RefreshAttemptPage:
      type: object
      required: [items, page]
      properties:
        items: {type: array, items: {$ref: '#/components/schemas/RefreshAttempt'}}
        page: {$ref: '#/components/schemas/PageInfo'}
    Snapshot:
      type: object
      required: [id, node_count, warning_count, accepted_at, stale]
      properties:
        id: {$ref: '#/components/schemas/Id'}
        node_count: {type: integer, minimum: 0}
        logical_outbound_count: {type: integer, minimum: 0}
        warning_count: {type: integer, minimum: 0}
        stale: {type: boolean}
        accepted_at: {$ref: '#/components/schemas/Timestamp'}
    SnapshotPage:
      type: object
      required: [items, page]
      properties:
        items: {type: array, items: {$ref: '#/components/schemas/Snapshot'}}
        page: {$ref: '#/components/schemas/PageInfo'}
    NodeHealthState:
      type: string
      enum: [unchecked, checking, healthy, degraded, unhealthy, unsupported, disabled]
    NodeSummary:
      type: object
      required: [id, source_id, protocol, original_name, occurrence_state, fingerprint_kind]
      properties:
        id: {$ref: '#/components/schemas/Id'}
        source_id: {$ref: '#/components/schemas/Id'}
        protocol: {type: string}
        original_name: {type: string}
        occurrence_state: {type: string, enum: [present, absent, retired]}
        fingerprint_kind: {type: string, enum: [semantic, opaque_structural]}
        health:
          anyOf: [{$ref: '#/components/schemas/NodeHealthState'}, {type: 'null'}]
        stale: {type: boolean}
        last_seen_at: {$ref: '#/components/schemas/Timestamp'}
    NodeDetail:
      allOf:
        - $ref: '#/components/schemas/NodeSummary'
        - type: object
          properties:
            lineage:
              type: array
              items:
                type: object
                required: [snapshot_id, raw_node_id, match_method]
                properties:
                  snapshot_id: {$ref: '#/components/schemas/Id'}
                  raw_node_id: {$ref: '#/components/schemas/Id'}
                  match_method: {type: string}
            canonical_completeness: {type: string, enum: [complete, partial, opaque]}
            warnings: {type: array, items: {$ref: '#/components/schemas/Warning'}}
    NodePage:
      type: object
      required: [items, page]
      properties:
        items: {type: array, items: {$ref: '#/components/schemas/NodeSummary'}}
        page: {$ref: '#/components/schemas/PageInfo'}
    HealthRecord:
      type: object
      required: [id, level, result, success, node_attributable, total_ms, observed_at, stale]
      properties:
        id: {$ref: '#/components/schemas/Id'}
        level: {type: string, enum: [endpoint, proxy_http, capability, control]}
        result:
          type: string
          enum: [success, dns_failure, connect_timeout, connect_refused, auth_failure, tls_failure, protocol_failure, unexpected_status, target_failure, executor_unsupported, executor_crash, resource_limited, cancelled]
        success: {type: boolean}
        node_attributable: {type: boolean}
        total_ms: {type: integer, minimum: 0}
        observed_at: {$ref: '#/components/schemas/Timestamp'}
        stale: {type: boolean}
        executor: {type: string}
        executor_version: {type: string}
    HealthRecordPage:
      type: object
      required: [items, page]
      properties:
        items: {type: array, items: {$ref: '#/components/schemas/HealthRecord'}}
        page: {$ref: '#/components/schemas/PageInfo'}
    CollectionCreate:
      type: object
      additionalProperties: false
      required: [display_name, members]
      properties:
        display_name: {type: string, minLength: 1, maxLength: 200}
        members:
          type: array
          minItems: 1
          maxItems: 1000
          items:
            type: object
            additionalProperties: false
            required: [kind, id]
            properties:
              kind: {type: string, enum: [source, node_occurrence]}
              id: {$ref: '#/components/schemas/Id'}
              enabled: {type: boolean, default: true}
    PipelineCreate:
      type: object
      additionalProperties: false
      required: [display_name, operations]
      properties:
        display_name: {type: string, minLength: 1, maxLength: 200}
        operations:
          type: array
          maxItems: 100
          items:
            type: object
            additionalProperties: false
            required: [type, schema_version, config]
            properties:
              type: {type: string, enum: [filter, rename, sort, set_field, remove_field, group]}
              schema_version: {type: integer, minimum: 1}
              config: {type: object, additionalProperties: true}
    TemplateCreate:
      type: object
      additionalProperties: false
      required: [display_name, source_type, target_format, content]
      properties:
        display_name: {type: string, minLength: 1, maxLength: 200}
        source_type: {type: string, enum: [inline, upload, remote, source_snapshot]}
        target_format: {type: string}
        content: {type: string, writeOnly: true, maxLength: 52428800}
        private_network_authorized: {type: boolean, default: false}
    RevisionedResource:
      type: object
      required: [id, type, display_name, lifecycle_state, draft_revision, created_at, updated_at]
      properties:
        id: {$ref: '#/components/schemas/Id'}
        type: {type: string, enum: [collection, pipeline, template, health_policy, probe_profile]}
        display_name: {type: string}
        lifecycle_state: {type: string, enum: [active, archived]}
        draft_revision: {$ref: '#/components/schemas/RevisionRef'}
        published_revision:
          anyOf: [{$ref: '#/components/schemas/RevisionRef'}, {type: 'null'}]
        configuration: {type: object, additionalProperties: true}
        created_at: {$ref: '#/components/schemas/Timestamp'}
        updated_at: {$ref: '#/components/schemas/Timestamp'}
    RevisionedResourcePage:
      type: object
      required: [items, page]
      properties:
        items: {type: array, items: {$ref: '#/components/schemas/RevisionedResource'}}
        page: {$ref: '#/components/schemas/PageInfo'}
    OutputCreate:
      type: object
      additionalProperties: false
      required: [display_name, collection_revision_id, pipeline_revision_id, target_profile_id, target_profile_version, health_policy_revision_id, probe_profile_revision_id, output_shape]
      properties:
        display_name: {type: string, minLength: 1, maxLength: 200}
        collection_revision_id: {$ref: '#/components/schemas/Id'}
        pipeline_revision_id: {$ref: '#/components/schemas/Id'}
        template_revision_id:
          anyOf: [{$ref: '#/components/schemas/Id'}, {type: 'null'}]
        target_profile_id: {type: string}
        target_profile_version: {type: integer, minimum: 1}
        health_policy_revision_id: {$ref: '#/components/schemas/Id'}
        probe_profile_revision_id: {$ref: '#/components/schemas/Id'}
        output_shape: {type: string, enum: [outbounds_array, outbounds_object, full_config]}
        exclude_health: {type: array, items: {$ref: '#/components/schemas/NodeHealthState'}}
        minimum_nodes: {type: integer, minimum: 1, maximum: 100000, default: 1}
        maximum_drop_ratio: {type: number, minimum: 0, maximum: 1, default: 0.5}
    OutputPatch:
      type: object
      minProperties: 1
      properties:
        display_name: {type: string, minLength: 1, maxLength: 200}
        collection_revision_id: {$ref: '#/components/schemas/Id'}
        pipeline_revision_id: {$ref: '#/components/schemas/Id'}
        template_revision_id:
          anyOf: [{$ref: '#/components/schemas/Id'}, {type: 'null'}]
        target_profile_id: {type: string}
        target_profile_version: {type: integer, minimum: 1}
        health_policy_revision_id: {$ref: '#/components/schemas/Id'}
        probe_profile_revision_id: {$ref: '#/components/schemas/Id'}
        output_shape: {type: string, enum: [outbounds_array, outbounds_object, full_config]}
        exclude_health: {type: array, items: {$ref: '#/components/schemas/NodeHealthState'}}
        minimum_nodes: {type: integer, minimum: 1, maximum: 100000}
        maximum_drop_ratio: {type: number, minimum: 0, maximum: 1}
    Output:
      type: object
      required: [id, display_name, lifecycle_state, draft_revision, publication_mode, created_at, updated_at]
      properties:
        id: {$ref: '#/components/schemas/Id'}
        display_name: {type: string}
        lifecycle_state: {type: string, enum: [active, archived]}
        draft_revision: {$ref: '#/components/schemas/RevisionRef'}
        published_revision:
          anyOf: [{$ref: '#/components/schemas/RevisionRef'}, {type: 'null'}]
        publication_mode: {type: string, enum: [automatic, manual_lock]}
        current_artifact_id:
          anyOf: [{$ref: '#/components/schemas/Id'}, {type: 'null'}]
        latest_build_status: {type: [string, 'null'], enum: [building, validated, rejected, publishable, null]}
        publication_token_hint: {type: [string, 'null']}
        created_at: {$ref: '#/components/schemas/Timestamp'}
        updated_at: {$ref: '#/components/schemas/Timestamp'}
    OutputPage:
      type: object
      required: [items, page]
      properties:
        items: {type: array, items: {$ref: '#/components/schemas/Output'}}
        page: {$ref: '#/components/schemas/PageInfo'}
    BuildRequest:
      type: object
      additionalProperties: false
      required: [output_revision_id]
      properties:
        output_revision_id: {$ref: '#/components/schemas/Id'}
        publish_on_success: {type: boolean, default: false}
        reason: {type: string, minLength: 1, maxLength: 500, default: manual}
    Artifact:
      type: object
      required: [id, output_id, output_revision_id, build_sequence, status, reason, created_at]
      properties:
        id: {$ref: '#/components/schemas/Id'}
        output_id: {$ref: '#/components/schemas/Id'}
        output_revision_id: {$ref: '#/components/schemas/Id'}
        build_sequence: {type: integer, minimum: 1}
        status: {type: string, enum: [building, validated, rejected, publishable]}
        reason: {type: string}
        node_count: {type: [integer, 'null'], minimum: 0}
        warning_count: {type: integer, minimum: 0}
        sha256: {type: [string, 'null'], pattern: '^[0-9a-f]{64}$'}
        created_at: {$ref: '#/components/schemas/Timestamp'}
        completed_at:
          anyOf: [{$ref: '#/components/schemas/Timestamp'}, {type: 'null'}]
    ArtifactDetail:
      allOf:
        - $ref: '#/components/schemas/Artifact'
        - type: object
          properties:
            manifest: {type: object, additionalProperties: true}
            validations:
              type: array
              items:
                type: object
                required: [strength, validator, version, status]
                properties:
                  strength: {type: string, enum: [structural, semantic_internal, target_binary]}
                  validator: {type: string}
                  version: {type: string}
                  status: {type: string, enum: [passed, failed, skipped]}
            diff_summary: {type: object, additionalProperties: true}
    ArtifactPage:
      type: object
      required: [items, page]
      properties:
        items: {type: array, items: {$ref: '#/components/schemas/Artifact'}}
        page: {$ref: '#/components/schemas/PageInfo'}
