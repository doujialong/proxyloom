    handling: preserve_in_template_or_exclude_from_node_collection
  - id: dns
    handling: preserve_in_template_or_exclude_from_node_collection
  - id: selector
    handling: preserve_as_logical_outbound_and_validate_references
  - id: urltest
    handling: preserve_as_logical_outbound_and_validate_references
  - id: reject
    handling: preserve_in_mihomo_config_or_exclude_from_node_collection
  - id: rematch
    handling: preserve_in_mihomo_config_or_exclude_from_node_collection

non_node_singbox_objects:
  - id: tailscale
    object_kind: endpoint
    handling: preserve_in_complete_config_and_validate_references
  - id: derp
    object_kind: service
    handling: preserve_in_complete_config
  - id: ssm-api
    object_kind: service
    handling: preserve_in_complete_config

cross_cutting_extensions:
  - id: tls
    includes: [sni, alpn, certificates, insecure]
    rule: Connection identity, normalization and conversion must include every applicable field.
  - id: reality
    includes: [public_key, short_id, fingerprint]
    rule: Never silently drop during conversion.
  - id: ech
    includes: [enabled, config, pq_signature_schemes, dynamic_record_sizing_disabled]
    rule: Unknown nested ECH fields remain in Raw Node even when canonical parsing is partial.
  - id: utls
    includes: [enabled, fingerprint]
    rule: Target-specific semantics require a target fixture.
  - id: transports
    includes: [tcp, udp, ws, http, httpupgrade, grpc, quic]
    rule: Transport fields participate in Fingerprint and Health Key projections.

release_gate:
  implemented_dimension_requires:
    recognize: [detection_fixture]
    lossless_passthrough: [lossless_golden]
    normalize: [canonical_parse_fixture]
    edit_convert: [canonical_parse_fixture, render_fixture]
    real_health_check: [real_probe_fixture]
    target_validation: [target_binary_fixture]
  regression_rule: >-
    A released implemented dimension cannot be downgraded silently. A regression
    blocks release or is published as an explicit compatibility advisory while
    same-format Raw Node preservation remains enabled.
