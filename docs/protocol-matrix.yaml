  - id: m4-multi-format-singbox-renderer-v1
    status: verified_m4_preview
    formats: [uri-list, mihomo-yaml-json, client-text]
    target_profiles: [singbox-1.12, singbox-1.13, momo-singbox-1.12]
    protocol_ids: [http, shadowsocks, vmess, vless, trojan, hysteria2, tuic, anytls, naive]
    verified_dimensions:
      normalize: verified_field_subset_with_unknown_field_rejection
      edit_convert: canonical_node_to_singbox_with_stable_names
      target_validation: exact_singbox_1.12.25_and_1.13.14_binary_check
    evidence_paths:
      - internal/convert/convert_test.go
      - internal/service/service_test.go
      - internal/executor/singbox/validator_test.go
      - docs/m4-status.md
    limitation: >-
      Conversion is field-gated rather than scheme-gated. Fields without a verified
      equivalent reject that node instead of being discarded. In particular,
      Hysteria2 URI pinSHA256 hashes the full leaf certificate while sing-box
      certificate_public_key_sha256 hashes the public key and bypasses standard
      certificate verification. Embedding the observed certificate cannot preserve
      the intersection of the original CA, hostname and full-certificate pin checks,
      so those values are not converted. Same-format publication continues to
      preserve the original bytes.
  - id: m4-singbox-real-health-executor-v1
    status: verified_m4_preview
    executor: sing-box-1.12.25
    protocol_ids: [http, shadowsocks, vmess, vless, trojan, hysteria2, tuic, anytls]
    verified_dimensions:
      real_health_check: isolated_mixed_inbound_https_probe_with_persisted_result
      failure_guard: mass_failure_suppression_prevents_health_based_filtering
    evidence_paths:
      - internal/executor/singbox/probe.go
      - internal/executor/singbox/validator_test.go
      - internal/service/service_test.go
      - docs/m4-status.md
    limitation: >-
      Only nodes with a verified sing-box Canonical rendering are executable. The
      Mihomo executor is not implemented. Results observed while the mass-failure
      guard is active are retained for diagnostics but cannot drive filtering.
  - id: m1-core-scale-and-fuzz-v1
    status: verified_m1_exit
    verified_dimensions:
      scale: parser_occurrence_and_name_allocation_at_20000_nodes
