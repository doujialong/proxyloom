dimensions:
  recognize: Determine a stable protocol ID and safe display metadata.
  lossless_passthrough: Preserve the complete native object in the same format family.
  normalize: Parse connection, authentication, TLS, transport and extension fields.
  edit_convert: Safely patch and render the protocol to a supported target format.
  real_health_check: Use a real protocol stack to proxy an HTTPS probe.
  target_validation: Validate generated output against the declared target profile.

