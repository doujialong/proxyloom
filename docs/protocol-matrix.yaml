inventory_policy:
  upstream_baselines:
    - sing-box v1.12.25
    - sing-box v1.13.14 compatibility watch
    - Momo v1.2.1
    - Mihomo v1.19.28 research baseline
  update_rule: >-
    Compare every new stable upstream release and public protocol report with this
    inventory. Add an opaque same-format fixture first, then fill dimensions
    independently. A private protocol without a legal specification or sample is
    recorded as blocked rather than represented as supported.
  unknown_protocol_behavior: >-
    Preserve the native object, assign a namespaced unknown protocol ID, compute an
    opaque structural fingerprint, and reject semantic conversion. Unknown entries
    must not abort other nodes in the document.

